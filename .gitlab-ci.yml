stages:
  - check
  - mirror

check:
  stage: check
  before_script:
    # Clear stale broker containers from prior runs — by name (legacy
    # `emqx` + current `hivemq`) and by any container publishing 1883
    # (testcontainers leaves random-named containers after killed runs).
    - docker rm -f emqx hivemq 2>/dev/null || true
    - docker ps -q --filter publish=1883 | xargs -r docker rm -f
    - docker ps -q --filter "ancestor=hivemq/hivemq-ce" | xargs -r docker rm -f
    # DEBUG — show what's currently using 1883 on the runner host
    - ss -tlnp 2>/dev/null | grep 1883 || echo "no listener on 1883"
    - docker ps -a 2>/dev/null | head -20 || true
  script:
    - cargo cmd checks
    - cargo nextest run --lib --no-default-features --profile ci --cargo-profile dev --target x86_64-unknown-linux-gnu
    - cargo tarpaulin --skip-clean --lib --no-default-features --target x86_64-unknown-linux-gnu --exclude-files=src/main.rs --target-dir=target/coverage --out Xml
    - cargo cmd healthcheck
    - cargo cmd integration
    - cargo cmd hardware-in-loop
  coverage: '/^\d+.\d+% coverage/'
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

mirror:
  stage: mirror
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git checkout -B main
    - git push --mirror git@github.com:engineering-with-ai/rust-embassy.git
  only:
    - main
