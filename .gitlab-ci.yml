stages:
  - check
  - mirror

check:
  stage: check
  before_script:
    # Clear stale broker containers from prior runs. Use `docker ps -a`
    # not the default `docker ps` — failed testcontainer runs leave the
    # container in `Created` state (not Running), which still reserves
    # the port mapping. `Created` containers don't show up without -a.
    - docker rm -f emqx hivemq 2>/dev/null || true
    - docker ps -aq --filter "ancestor=hivemq/hivemq-ce" | xargs -r docker rm -f
    - docker ps -aq --filter "ancestor=emqx/emqx" | xargs -r docker rm -f
  script:
    - cargo cmd checks
    - cargo nextest run --lib --no-default-features --profile ci --cargo-profile dev --target x86_64-unknown-linux-gnu
    - cargo tarpaulin --skip-clean --lib --no-default-features --target x86_64-unknown-linux-gnu --exclude-files=src/main.rs --target-dir=target/coverage --out Xml
    - cargo cmd healthcheck
    - cargo cmd integration
    - cargo cmd hardware-in-loop
  coverage: '/^\d+.\d+% coverage/'
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

mirror:
  stage: mirror
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git checkout -B main
    - git push --mirror git@github.com:engineering-with-ai/rust-embassy.git
  only:
    - main
