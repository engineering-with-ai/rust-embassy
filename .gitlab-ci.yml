stages:
  - check
  - mirror

check:
  stage: check
  before_script:
    # Clear stale broker containers from prior runs — includes both the
    # legacy `emqx` name and the new `hivemq` so we don't collide on 1883.
    - docker rm -f emqx hivemq 2>/dev/null || true
  script:
    - cargo cmd checks
    - cargo nextest run --lib --no-default-features --profile ci --cargo-profile dev --target x86_64-unknown-linux-gnu
    - cargo tarpaulin --skip-clean --lib --no-default-features --target x86_64-unknown-linux-gnu --exclude-files=src/main.rs --target-dir=target/coverage --out Xml
    - cargo cmd healthcheck
    - cargo cmd integration
    - cargo cmd hardware-in-loop
  coverage: '/^\d+.\d+% coverage/'
  artifacts:
    when: always
    reports:
      junit: target/nextest/ci/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml

mirror:
  stage: mirror
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - git checkout -B main
    - git push --mirror git@github.com:engineering-with-ai/rust-embassy.git
  only:
    - main
